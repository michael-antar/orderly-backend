spring.application.name=orderly-backend

# JPA 
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration

# Security / JWT (generate with `openssl rand -base64 32`)
app.jwt.secret=${JWT_SECRET}

# Mail (Resend SMTP)
spring.mail.host=smtp.resend.com
spring.mail.port=465
spring.mail.username=resend
spring.mail.password=${RESEND_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
app.mail.from=${MAIL_FROM_ADDRESS}
app.frontend.base-url=${FRONTEND_BASE_URL}

# Jackson — serialize Instant as ISO-8601 string, not epoch seconds
spring.jackson.serialization.write-dates-as-timestamps=false

# OpenAPI / springdoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# CORS (local dev only — production uses nginx proxy on same origin)
# Configured in SecurityConfig; override per-profile if needed
