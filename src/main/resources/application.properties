spring.application.name=orderly-backend

# JPA 
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration

#  Security / JWT 
# Configured via environment — see application-local.properties for local dev
# spring.security.oauth2.resourceserver.jwt.secret=${JWT_SECRET}

# Mail
# spring.mail.host=smtp.resend.com
# spring.mail.port=465
# spring.mail.username=${MAIL_USERNAME}
# spring.mail.password=${MAIL_API_KEY}

# OpenAPI / springdoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# CORS (local dev only — production uses nginx proxy on same origin)
# Configured in SecurityConfig; override per-profile if needed
